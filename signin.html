<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
		<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
		<title>Sign In - Bite of Bliss</title>
		<style>
			* { box-sizing: border-box; margin: 0; padding: 0; font-family: "Poppins", sans-serif; }
			body { min-height: 100vh; display: grid; place-items: center; padding: 24px; background: linear-gradient(rgba(18, 15, 12, 0.7), rgba(18, 15, 12, 0.7)), url("https://images.unsplash.com/photo-1517433670267-08bbd4be890f?auto=format&fit=crop&w=1600&q=80") center/cover fixed; }
			.auth-shell { width: 100%; max-width: 440px; background: rgba(255,255,255,0.95); border-radius: 24px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
			.brand { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
			.brand img { width: 56px; height: 56px; object-fit: contain; }
			.brand h1 { font-size: 1.4rem; color: #2f2a25; }
			.brand p { color: #6b625c; font-size: 0.92rem; }
			h2 { color: #2f2a25; font-size: 2rem; margin-bottom: 6px; }
			.subtle { color: #6b625c; margin-bottom: 24px; }
			.form-group { margin-bottom: 16px; }
			label { display: block; margin-bottom: 8px; color: #3c342f; font-weight: 500; }
			input { width: 100%; padding: 14px 16px; border: 1px solid #ddd; border-radius: 14px; font-size: 1rem; outline: none; }
			input:focus { border-color: #e67e22; box-shadow: 0 0 0 4px rgba(230,126,34,0.14); }
			.password-row { position: relative; }
			.toggle-password { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #7a6f68; }
			.error { display: none; color: #b42318; font-size: 0.9rem; margin-top: 8px; }
			.primary-btn { width: 100%; border: none; border-radius: 14px; padding: 14px 16px; margin-top: 6px; background: #e67e22; color: #fff; font-weight: 700; font-size: 1rem; cursor: pointer; }
			.primary-btn:hover { background: #d35400; }
			.links { display: flex; justify-content: space-between; gap: 16px; margin-top: 18px; flex-wrap: wrap; }
			.links a { color: #e67e22; text-decoration: none; font-weight: 600; }
			.links a:hover { text-decoration: underline; }
			.note { margin-top: 18px; padding: 12px 14px; background: #fff6ee; border-radius: 12px; color: #7a4a12; font-size: 0.92rem; line-height: 1.5; }
		</style>
	</head>
	<body>
		<div class="auth-shell">
			<div class="brand">
				<img src="logo.png" alt="Bite of Bliss logo" />
				<div>
					<h1>Bite of Bliss</h1>
					<p>Sign in to place your order</p>
				</div>
			</div>
			<h2>Welcome back</h2>
			<p class="subtle">Use your account to add items and submit your order.</p>

			<form id="signinForm">
				<div class="form-group">
					<label for="email">Email</label>
					<input type="email" id="email" required />
					<div class="error" id="emailError">Please enter a valid email address.</div>
				</div>
				<div class="form-group">
					<label for="password">Password</label>
					<div class="password-row">
						<input type="password" id="password" required />
						<i class="fas fa-eye toggle-password" id="togglePassword"></i>
					</div>
					<div class="error" id="passwordError">Please enter your password.</div>
				</div>
				<button type="submit" class="primary-btn">Sign In</button>
			</form>

			<div class="links">
				<a href="index.html">Back to Home</a>
				<a href="signup.html">Create Account</a>
			</div>

			<div class="note">After sign in, your token is saved in the browser so you can place orders from the menu.</div>
		</div>

		<script>
			document.addEventListener("DOMContentLoaded", () => {
				const form = document.getElementById("signinForm");
				const togglePassword = document.getElementById("togglePassword");
				const password = document.getElementById("password");

				togglePassword.addEventListener("click", () => {
					const type = password.getAttribute("type") === "password" ? "text" : "password";
					password.setAttribute("type", type);
					togglePassword.classList.toggle("fa-eye");
					togglePassword.classList.toggle("fa-eye-slash");
				});

				form.addEventListener("submit", async (e) => {
					e.preventDefault();

					document.querySelectorAll(".error").forEach((el) => (el.style.display = "none"));

					const email = document.getElementById("email").value.trim();
					const passwordValue = document.getElementById("password").value;
					let valid = true;

					if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
						document.getElementById("emailError").style.display = "block";
						valid = false;
					}

					if (!passwordValue.trim()) {
						document.getElementById("passwordError").style.display = "block";
						valid = false;
					}

					if (!valid) return;

					const response = await fetch("http://localhost:5001/api/auth/login", {
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: JSON.stringify({ email, password: passwordValue }),
					});

					const data = await response.json();
					if (!response.ok) {
  alert(data.error || "Sign in failed.");
  return;
}

localStorage.setItem("token", data.token);
localStorage.setItem("userName", data.user?.name || "");
localStorage.setItem("userId", data.user?._id || "");
localStorage.setItem("userRole", data.user?.role || "customer");

localStorage.setItem("isLoggedIn", "true");

alert("Sign in successful.");

window.location.href = "index.html";
				});
			});
		</script>
	</body>
</html>
