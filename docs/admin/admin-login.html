<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Portal - Bite of Bliss</title>
    <link rel="stylesheet" href="../stylesheet.css" />
    <style>
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(rgba(28, 20, 12, 0.78), rgba(28, 20, 12, 0.78)), url("https://images.unsplash.com/photo-1555507036-ab1f4038808a?auto=format&fit=crop&w=1600&q=80") center/cover fixed;
        font-family: "Poppins", sans-serif;
      }

      .portal-card {
        width: 100%;
        max-width: 430px;
        background: rgba(255, 255, 255, 0.97);
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
      }

      .portal-card h1,
      .portal-card h2,
      .portal-card p,
      .portal-card label {
        color: #2f261f;
      }

      .brand-badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 18px;
        padding: 10px 14px;
        border-radius: 999px;
        background: #fff4e8;
        color: #a74d00;
        font-weight: 700;
      }

      .brand-badge span {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #d66b00;
      }

      .field {
        margin-bottom: 16px;
      }

      .field input {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid #ddcdb9;
        border-radius: 14px;
        font-size: 1rem;
      }

      .field input:focus {
        outline: none;
        border-color: #d66b00;
        box-shadow: 0 0 0 4px rgba(214, 107, 0, 0.15);
      }

      .admin-btn {
        width: 100%;
        border: none;
        border-radius: 14px;
        padding: 14px 16px;
        background: #d66b00;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }

      .admin-btn:hover {
        background: #b85b00;
      }

      .note {
        margin-top: 16px;
        font-size: 0.95rem;
        color: #6d625a;
        line-height: 1.5;
      }

      .error {
        color: #b42318;
        margin-top: 10px;
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <div class="portal-card">
      <div class="brand-badge"><span></span> Admin Portal</div>
      <h1>Bite of Bliss</h1>
      <h2>Admin Sign In</h2>
      <p>Use your admin account to open the dashboard.</p>

      <form id="adminLoginForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required />
        </div>
        <button type="submit" class="admin-btn">Sign In as Admin</button>
      </form>

      <div class="error" id="adminError"></div>
      <div class="note">
        This portal only opens for users with the admin role. Customer accounts will not be allowed in.
      </div>
    </div>

    <script>
      const form = document.getElementById("adminLoginForm");
      const errorBox = document.getElementById("adminError");

      if (localStorage.getItem("adminToken") && localStorage.getItem("adminRole") === "admin") {
        window.location.href = "admin-dashboard.html";
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorBox.textContent = "";

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        try {
          const response = await fetch("http://localhost:5001/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "Admin login failed");
          }

          if (data.user?.role !== "admin") {
            throw new Error("This account is not an admin");
          }

          localStorage.setItem("adminToken", data.token);
          localStorage.setItem("adminUserName", data.user?.name || "");
          localStorage.setItem("adminUserId", data.user?._id || "");
          localStorage.setItem("adminRole", data.user?.role || "admin");
          localStorage.setItem("adminIsLoggedIn", "true");

          window.location.href = "admin-dashboard.html";
        } catch (error) {
          errorBox.textContent = error.message;
        }
      });
    </script>
  </body>
</html>
